<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="z7Mj1Pv6vn-anttbM9ODB8qZdNizalX0R8dIPdTJIpA" />
  <title>Login | Daily Code Snippet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-box">
      <h1 style="margin-bottom: 0.5rem;">🧩 Daily Snippet</h1>
      <p style="margin-bottom: 2rem; color: var(--text-muted);">Master a new pattern every day.</p>

      <input id="email" type="email" placeholder="Email Address" />
      <input id="password" type="password" placeholder="Password" />

      <div style="display: flex; gap: 10px; margin-bottom: 1.5rem;">
        <button class="btn-primary" onclick="login()">Login</button>
        <button class="btn-secondary" onclick="signup()">Signup</button>
      </div>

      <div class="divider">OR</div>

      <button class="google-btn" onclick="googleLogin()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Logo_2013_Google.png" width="20" />
        Sign in with Google
      </button>

      <button class="btn-text" onclick="continueAsGuest()">
        Skip login and continue as Guest &rarr;
      </button>

    </div>
  </div>

  <!-- COPYRIGHT FOOTER -->
  <footer style="
    position: fixed;
    bottom: 0;
    width: 100%;
    text-align: center;
    padding: 10px;
    font-size: 12px;
    color: var(--muted, #888);
    background: transparent;
  ">
    © 2026 Daily Code Snippet · Built by Shagun Kimothi
  </footer>

  <script type="module" src="auth.js"></script>
</body>
</html>
