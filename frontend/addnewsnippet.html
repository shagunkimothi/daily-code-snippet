<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Snippet | DailyCode</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .add-page { max-width:720px; margin:0 auto; padding:2rem 1.5rem; }
    .add-header { display:flex; align-items:center; gap:16px; margin-bottom:2rem; }
    .add-header h1 { font-size:26px; font-weight:700; }
    .tabs { display:flex; gap:8px; margin-bottom:2rem; border-bottom:1px solid var(--border); }
    .tab-btn { background:none; border:none; color:var(--muted); font-size:14px; font-weight:500; padding:10px 18px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.2s; font-family:inherit; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:#7c6fff; border-bottom-color:#7c6fff; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .snippet-form { display:flex; flex-direction:column; gap:14px; }
    .snippet-form input,.snippet-form select,.snippet-form textarea {
      width:100%; padding:12px 16px; background:var(--card); border:1px solid var(--border);
      border-radius:10px; color:var(--text); font-size:14px; box-sizing:border-box; font-family:inherit;
    }
    .snippet-form input:focus,.snippet-form select:focus,.snippet-form textarea:focus { outline:none; border-color:#7c6fff; }
    .snippet-form textarea { min-height:180px; resize:vertical; font-family:'Courier New',monospace; font-size:13px; }
    .form-row { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .toggle-public { display:flex; align-items:center; gap:10px; font-size:14px; color:var(--muted); cursor:pointer; user-select:none; }
    .toggle-public input[type="checkbox"] { width:18px; height:18px; accent-color:#7c6fff; cursor:pointer; }
    .btn-submit { padding:12px 28px; background:linear-gradient(135deg,#7c6fff,#4e46e5); border:none; border-radius:10px; color:white; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; }
    .btn-submit:hover { opacity:0.9; transform:translateY(-1px); }
    .btn-submit:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .ai-section,.import-section { display:flex; flex-direction:column; gap:14px; }
    .ai-section input,.import-section textarea {
      padding:12px 16px; background:var(--card); border:1px solid var(--border); border-radius:10px;
      color:var(--text); font-size:14px; box-sizing:border-box; width:100%; font-family:inherit;
    }
    .import-section textarea { min-height:160px; font-family:monospace; font-size:13px; resize:vertical; }
    .tags-input-wrap { position:relative; }
    .tags-preview { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; min-height:20px; }
    .tag-pill {
      display:inline-flex; align-items:center; gap:4px;
      padding:3px 10px; border-radius:999px; font-size:12px; font-weight:600;
      background:var(--primary-subtle); color:var(--primary); border:1px solid var(--primary-glow);
      cursor:pointer;
    }
    .tag-pill:hover { opacity:0.7; }
    .tag-pill::after { content:"×"; font-size:14px; }
    .toast { position:fixed; bottom:30px; right:30px; background:#22c55e; color:white; padding:14px 22px; border-radius:10px; font-size:14px; font-weight:600; opacity:0; transform:translateY(20px); transition:all 0.3s ease; z-index:999; pointer-events:none; }
    .toast.show { opacity:1; transform:translateY(0); }
    .field-label { font-size:12px; color:var(--muted); margin-bottom:4px; }
  </style>
</head>
<body>
  <script>if (!localStorage.getItem("token")) window.location.href = "auth.html";</script>

  <div class="add-page">
    <div class="add-header">
      <button onclick="history.back()" class="btn-secondary">← Go Back</button>
      <h1>Add to Library</h1>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="manual">Manual Entry</button>
      <button class="tab-btn" data-tab="ai">✨ AI Magic</button>
      <button class="tab-btn" data-tab="import">📥 Bulk Import</button>
    </div>

    <!-- MANUAL TAB -->
    <div id="manual" class="tab-content active">
      <form class="snippet-form" id="snippetForm">

        <input type="text" id="title" placeholder="Snippet Title" required maxlength="100" />

        <div class="form-row-2">
          <select id="language">
            <option value="JavaScript">JavaScript</option>
            <option value="Python">Python</option>
            <option value="Java">Java</option>
            <option value="C++">C++</option>
            <option value="HTML">HTML</option>
            <option value="CSS">CSS</option>
            <option value="TypeScript">TypeScript</option>
            <option value="Go">Go</option>
            <option value="Rust">Rust</option>
          </select>
          <select id="difficulty">
            <option value="beginner">🟢 Beginner</option>
            <option value="intermediate">🟡 Intermediate</option>
            <option value="advanced">🔴 Advanced</option>
          </select>
        </div>

        <select id="category">
          <option value="snippet">Snippet</option>
          <option value="algorithm">Algorithm</option>
          <option value="data-structure">Data Structure</option>
          <option value="utility">Utility</option>
          <option value="pattern">Pattern</option>
          <option value="other">Other</option>
        </select>

        <div class="tags-input-wrap">
          <input type="text" id="tagInput" placeholder="Add tags (press Enter or comma)" />
          <div class="tags-preview" id="tagsPreview"></div>
        </div>

        <textarea id="code" placeholder="// Paste your code here..." required></textarea>
        <textarea id="explanation" style="min-height:80px" placeholder="Explanation (optional)"></textarea>

        <div class="form-row">
          <label class="toggle-public">
            <input type="checkbox" id="isPublic" checked /> Make Public
          </label>
          <button type="submit" class="btn-submit" id="submitBtn">Create Snippet</button>
        </div>

      </form>
    </div>

    <!-- AI TAB -->
    <div id="ai" class="tab-content">
      <div class="ai-section">
        <input type="text" id="aiTopic" placeholder="e.g. Binary Search in Python, Debounce in JavaScript..." />
        <button onclick="generateAI()" class="btn-submit" id="aiBtn">✨ Generate Snippet</button>
      </div>
    </div>

    <!-- IMPORT TAB -->
    <div id="import" class="tab-content">
      <div class="import-section">
        <input type="file" id="jsonFile" accept=".json" />
        <textarea id="bulkText" placeholder='[{"title":"...","language":"...","code":"...","tags":["loop","array"]}]'></textarea>
        <button onclick="importSnippets()" class="btn-submit">📥 Import Snippets</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="addnewsnippets.js"></script>
</body>
</html>
