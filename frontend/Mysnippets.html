<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Snippets | DailyCode</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="Sidebar.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <style>
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.75rem; flex-wrap: wrap; gap: 10px;
    }
    .top-bar-left { display: flex; align-items: center; gap: 12px; }
    .btn-back {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--card); border: 1px solid var(--border-card);
      padding: 0.48rem 1rem; border-radius: var(--radius-md);
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      color: var(--text-secondary); font-family: 'DM Sans', inherit;
      transition: all 0.15s !important;
    }
    .btn-back:hover { border-color: var(--border-hover); color: var(--primary); background: var(--primary-subtle); }

    .page-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.35rem; font-weight: 800; letter-spacing: -0.03em;
    }

    .toolbar {
      display: flex; gap: 8px; margin-bottom: 14px;
      flex-wrap: nowrap; align-items: center;
    }
    .toolbar input { flex: 2; min-width: 0; }
    .toolbar select { flex: 1; min-width: 0; }

    .snippets-count {
      font-size: 0.78rem; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 12px; min-height: 18px;
    }

    /* SNIPPET CARD */
    .snippet-card {
      background: var(--card); border: 1px solid var(--border-card);
      border-radius: var(--radius-xl); padding: 18px 22px;
      margin-bottom: 12px; animation: fadeUp 0.35s cubic-bezier(0.22,1,0.36,1) both;
      position: relative; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s !important;
    }
    .snippet-card::before {
      content: ''; position: absolute;
      top: 0; left: 8%; right: 8%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary-glow), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .snippet-card:hover::before { opacity: 1; }
    .snippet-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg), 0 0 0 1px var(--border-hover); border-color: var(--border-hover); }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .card-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 6px;
    }
    .card-meta { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }

    .lang-badge { font-size: 0.68rem; padding: 2px 9px; border-radius: var(--radius-sm); border: 1px solid; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .diff-badge { font-size: 0.68rem; padding: 2px 9px; border-radius: var(--radius-sm); font-weight: 700; text-transform: capitalize; font-family: 'JetBrains Mono', monospace; }
    .diff-beginner     { background: var(--green-subtle);  color: var(--green);  border: 1px solid rgba(0,229,160,0.25); }
    .diff-intermediate { background: var(--amber-subtle);  color: var(--amber);  border: 1px solid rgba(255,170,48,0.25); }
    .diff-advanced     { background: var(--red-subtle);    color: var(--red);    border: 1px solid rgba(255,68,102,0.25); }
    .tag-badge { font-size: 0.68rem; padding: 2px 9px; border-radius: var(--radius-sm); font-weight: 700; background: var(--primary-subtle); color: var(--primary); border: 1px solid var(--primary-glow); }

    /* VISIBILITY TOGGLE */
    .vis-toggle {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 4px 12px; border-radius: var(--radius-sm);
      font-size: 0.72rem; font-weight: 700; cursor: pointer;
      border: 1px solid; font-family: 'JetBrains Mono', monospace;
      transition: all 0.15s !important; white-space: nowrap; flex-shrink: 0;
    }
    .vis-toggle.is-public  { background: var(--green-subtle);  color: var(--green);  border-color: rgba(0,229,160,0.3); }
    .vis-toggle.is-private { background: rgba(255,255,255,0.04); color: var(--muted); border-color: var(--border); }
    .vis-toggle:hover { opacity: 0.8; transform: scale(1.03); }
    .vis-toggle .toggle-dot {
      width: 7px; height: 7px; border-radius: 50%; background: currentColor;
      box-shadow: 0 0 6px currentColor;
    }

    /* CARD ACTIONS */
    .card-actions { display: flex; gap: 7px; align-items: flex-start; flex-shrink: 0; }
    .action-btn {
      padding: 5px 12px; border-radius: var(--radius-sm);
      font-size: 0.75rem; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border-card); background: var(--card);
      color: var(--text-secondary); font-family: 'DM Sans', inherit;
      transition: all 0.15s !important; white-space: nowrap;
    }
    .action-btn:hover { border-color: var(--border-hover); color: var(--primary); background: var(--primary-subtle); }
    .action-btn.del { color: var(--red); border-color: rgba(255,68,102,0.15); }
    .action-btn.del:hover { background: var(--red-subtle); border-color: var(--red); }

    .card-explanation {
      font-size: 0.82rem; color: var(--text-secondary); margin-top: 10px;
      font-style: italic; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-code-preview {
      background: var(--code-bg); border: 1px solid var(--code-border);
      border-radius: var(--radius-md); padding: 10px 14px; margin-top: 12px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #5a7a99;
      overflow: hidden; max-height: 72px; position: relative; line-height: 1.6;
    }
    .card-code-preview::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 28px;
      background: linear-gradient(transparent, var(--code-bg));
    }

    /* PUBLIC BADGE — shown on cards that feed the daily */
    .daily-feed-badge {
      font-size: 0.62rem; padding: 2px 8px; border-radius: var(--radius-sm);
      background: rgba(0,212,255,0.08); color: var(--primary);
      border: 1px solid var(--primary-glow);
      font-family: 'JetBrains Mono', monospace; font-weight: 700;
      letter-spacing: 0.06em;
    }

    .expand-btn {
      margin-top: 10px;
      background: none; border: none;
      color: var(--primary); font-size: 0.75rem; font-weight: 700;
      cursor: pointer; font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em; padding: 4px 0;
      transition: opacity 0.15s !important;
    }
    .expand-btn:hover { opacity: 0.7; }
    .code-wrap pre { border-radius: var(--radius-md) !important; }
    .code-wrap pre::-webkit-scrollbar { width: 4px; }
    .code-wrap pre::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 99px; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty-icon { font-size: 42px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 0.875rem; margin-bottom: 18px; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card); border: 1px solid var(--border-card);
      border-radius: var(--radius-xl); padding: 28px; max-width: 460px;
      width: 90%; box-shadow: var(--shadow-lg);
      transform: scale(0.95); transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal h3 { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .modal p  { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 20px; line-height: 1.5; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 20px; border-radius: var(--radius-md);
      font-size: 0.85rem; font-weight: 700; color: #03080e;
      background: var(--green); opacity: 0; transform: translateY(20px);
      transition: all 0.3s; z-index: 999; pointer-events: none;
      font-family: 'DM Sans', inherit;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: var(--red); color: white; }
  </style>
</head>
<body>
  <script>if (!localStorage.getItem("token")) window.location.href = "auth.html";</script>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-content">
      <div class="sidebar-header">
        <div class="logo-container">
          <div class="logo">&lt;/&gt;</div>
          <h1 class="app-title">DailyCode</h1>
        </div>
        <nav class="nav-menu">
          <button class="nav-item" data-view="dashboard"><span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span></button>
          <button class="nav-item" data-view="calendar"><span class="nav-icon">📅</span><span class="nav-label">Calendar</span></button>
          <button class="nav-item" data-view="favorites"><span class="nav-icon">⭐</span><span class="nav-label">Favorites</span></button>
        </nav>
      </div>
      <div class="sidebar-footer">
        <button class="add-snippet-btn" data-view="add"><span class="add-icon">＋</span> Add Snippet</button>
      </div>
    </div>
  </aside>

  <div class="main-wrapper">
    <div class="app-container">

      <!-- TOP BAR -->
      <div class="top-bar">
        <div class="top-bar-left">
          <button class="btn-back" onclick="history.back()">← Go Back</button>
          <h2 class="page-title">📁 My Snippets</h2>
        </div>
        <a href="addnewsnippet.html" class="btn-primary" style="text-decoration:none">＋ Add Snippet</a>
      </div>

      <!-- INFO BANNER: public snippets feed daily -->
      <div style="background:var(--primary-subtle);border:1px solid var(--primary-glow);border-radius:var(--radius-md);padding:10px 16px;margin-bottom:16px;font-size:0.8rem;color:var(--text-secondary);line-height:1.5">
        🌐 <strong style="color:var(--primary)">Public snippets</strong> are visible to everyone and feed the <strong style="color:var(--primary)">Daily Snippet</strong> rotation on the home page.
        🔒 <strong style="color:var(--text)">Private snippets</strong> are only visible to you.
        Toggle visibility with the button on each card.
      </div>

      <!-- TOOLBAR -->
      <div class="toolbar">
        <input id="filterInput" placeholder="🔍 Filter snippets..." />
        <select id="filterLang">
          <option value="">All Languages</option>
          <option value="Python">Python</option>
          <option value="JavaScript">JavaScript</option>
          <option value="Java">Java</option>
          <option value="C++">C++</option>
          <option value="HTML">HTML</option>
          <option value="CSS">CSS</option>
          <option value="TypeScript">TypeScript</option>
          <option value="Go">Go</option>
          <option value="Rust">Rust</option>
        </select>
        <select id="filterDiff">
          <option value="">All Levels</option>
          <option value="beginner">🟢 Beginner</option>
          <option value="intermediate">🟡 Intermediate</option>
          <option value="advanced">🔴 Advanced</option>
        </select>
        <select id="filterVis">
          <option value="">All</option>
          <option value="public">🌐 Public only</option>
          <option value="private">🔒 Private only</option>
        </select>
      </div>

      <p class="snippets-count" id="snippetsCount"></p>
      <div id="snippetsList"></div>

    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>🗑️ Delete Snippet?</h3>
    <p id="deleteModalMsg">This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="action-btn" onclick="closeModal()">Cancel</button>
      <button class="action-btn del" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="Sidebar.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script>
const API = "http://127.0.0.1:8000";
let allSnippets = [];
let pendingDeleteId = null;

const langColors = {
  python:"#3776ab", javascript:"#f7df1e", java:"#ed8b00",
  "c++":"#00599c", typescript:"#3178c6", html:"#e34c26",
  css:"#1572b6", go:"#00add8", rust:"#ce4a08", default:"#00d4ff"
};

/* ── TOAST ── */
function toast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isError ? " error" : "");
  setTimeout(() => t.className = "toast", 3000);
}

/* ── LOAD ── */
async function load() {
  const token = localStorage.getItem("token");
  try {
    const res = await fetch(`${API}/snippets/mine`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    allSnippets = await res.json();
    render();
  } catch {
    document.getElementById("snippetsList").innerHTML =
      `<p style="color:var(--muted)">Failed to load snippets.</p>`;
  }
}

/* ── RENDER ── */
function render() {
  const q   = document.getElementById("filterInput").value.toLowerCase();
  const lng = document.getElementById("filterLang").value.toLowerCase();
  const dif = document.getElementById("filterDiff").value;
  const vis = document.getElementById("filterVis").value;

  const filtered = allSnippets.filter(s => {
    if (q   && !s.title.toLowerCase().includes(q) && !(s.code||"").toLowerCase().includes(q)) return false;
    if (lng && s.language.toLowerCase() !== lng) return false;
    if (dif && s.difficulty !== dif) return false;
    if (vis === "public"  && !s.is_public) return false;
    if (vis === "private" && s.is_public)  return false;
    return true;
  });

  const pub = allSnippets.filter(s => s.is_public).length;
  document.getElementById("snippetsCount").textContent =
    `Showing ${filtered.length} of ${allSnippets.length} snippets · ${pub} public (feeding daily)`;

  const list = document.getElementById("snippetsList");
  if (!filtered.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <h3>No snippets found</h3>
        <p>Try different filters or add a new snippet.</p>
        <a href="addnewsnippet.html" class="btn-primary" style="text-decoration:none;display:inline-flex">＋ Add Snippet</a>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map((s, i) => {
    const color     = langColors[s.language.toLowerCase()] || langColors.default;
    const diffClass = `diff-${s.difficulty || "beginner"}`;
    const tags      = (s.tags||[]).map(t => `<span class="tag-badge">${t.name}</span>`).join("");
    const visCls   = s.is_public ? "is-public" : "is-private";
    const visLabel = s.is_public ? "🌐 Public" : "🔒 Private";
    const visTitle = s.is_public
      ? "Click to make Private (removes from daily)"
      : "Click to make Public (adds to daily)";
    const dailyBadge = s.is_public
      ? `<span class="daily-feed-badge">◆ DAILY FEED</span>` : "";

    return `
    <div class="snippet-card" style="animation-delay:${i*0.04}s" data-id="${s.id}">
      <div class="card-top">
        <div style="flex:1;min-width:0">
          <div class="card-title">${escHtml(s.title)}</div>
          <div class="card-meta">
            <span class="lang-badge" style="color:${color};border-color:${color}">${s.language}</span>
            <span class="diff-badge ${diffClass}">${s.difficulty||"beginner"}</span>
            ${tags}
            ${dailyBadge}
          </div>
        </div>
        <div class="card-actions">
          <button class="vis-toggle ${visCls}" title="${visTitle}"
            onclick="toggleVisibility(${s.id}, ${s.is_public})">
            <span class="toggle-dot"></span>${visLabel}
          </button>
          <button class="action-btn" onclick="copyCode(${s.id})">📋 Copy</button>
          <button class="action-btn del" onclick="confirmDelete(${s.id}, '${escAttr(s.title)}')">🗑️</button>
        </div>
      </div>
      ${s.explanation ? `<p class="card-explanation">${escHtml(s.explanation)}</p>` : ""}
      <!-- Full code block, collapsible -->
      <div class="code-wrap" id="code-${s.id}" style="display:none">
        <pre style="margin-top:12px;max-height:320px;overflow-y:auto"><code class="language-${s.language.toLowerCase()}">${escHtml(s.code||"")}</code></pre>
      </div>
      <button class="expand-btn" onclick="toggleCode(${s.id}, this)">▶ Show Code</button>
    </div>`;
  }).join("");
}

function escHtml(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escAttr(s) {
  return (s||"").replace(/'/g,"\\'").replace(/"/g,"&quot;");
}

/* ── TOGGLE VISIBILITY ── */
async function toggleVisibility(id, currentlyPublic) {
  const token = localStorage.getItem("token");
  const newState = !currentlyPublic;
  try {
    const res = await fetch(`${API}/snippets/${id}/visibility`, {
      method: "PATCH",
      headers: { "Content-Type":"application/json", "Authorization":`Bearer ${token}` },
      body: JSON.stringify({ is_public: newState })
    });
    if (!res.ok) throw new Error();
    // Update local state
    const idx = allSnippets.findIndex(s => s.id === id);
    if (idx !== -1) allSnippets[idx].is_public = newState;
    render();
    localStorage.setItem("snippetsChanged", "true");
    toast(newState
      ? "🌐 Made public — now feeds the daily snippet!"
      : "🔒 Made private — removed from daily feed");
  } catch {
    toast("❌ Could not update visibility", true);
  }
}

/* ── COPY ── */
function copyCode(id) {
  const s = allSnippets.find(x => x.id === id);
  if (!s) return;
  navigator.clipboard.writeText(s.code || "");
  toast("📋 Code copied!");
}

/* ── DELETE ── */
function confirmDelete(id, title) {
  pendingDeleteId = id;
  document.getElementById("deleteModalMsg").textContent =
    `Delete "${title}"? This action cannot be undone.`;
  document.getElementById("deleteModal").classList.add("open");
}
function closeModal() {
  pendingDeleteId = null;
  document.getElementById("deleteModal").classList.remove("open");
}
document.getElementById("confirmDeleteBtn").addEventListener("click", async () => {
  if (!pendingDeleteId) return;
  const token = localStorage.getItem("token");
  try {
    const res = await fetch(`${API}/snippets/${pendingDeleteId}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${token}` }
    });
    if (res.ok || res.status === 204) {
      allSnippets = allSnippets.filter(s => s.id !== pendingDeleteId);
      closeModal();
      render();
      localStorage.setItem("snippetsChanged", "true");
      toast("🗑️ Snippet deleted");
    } else {
      toast("❌ Could not delete", true);
    }
  } catch { toast("❌ Error deleting", true); }
});

/* ── FILTER LISTENERS ── */
["filterInput","filterLang","filterDiff","filterVis"].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener(id === "filterInput" ? "input" : "change", render);
});

/* ── EXPAND/COLLAPSE CODE ── */
function toggleCode(id, btn) {
  const wrap = document.getElementById('code-' + id);
  const open = wrap.style.display === 'none';
  wrap.style.display = open ? 'block' : 'none';
  btn.textContent = open ? '▼ Hide Code' : '▶ Show Code';
  if (open && window.Prism) Prism.highlightElement(wrap.querySelector('code'));
}

load();
</script>
</body>
</html>
