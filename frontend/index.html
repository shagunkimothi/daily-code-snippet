<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Code Snippet</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="Sidebar.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <style>
    .controls { display:flex; flex-direction:column; gap:10px; margin-bottom:1rem; }
    .controls-row { display:flex; gap:10px; }
    .controls-row input { flex:2; }
    .controls-row select { flex:1; }

    .tag-filters { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-top:2px; }
    .tag-filter-label { font-size:12px; color:var(--muted); flex-shrink:0; }
    .tag-chip { padding:4px 12px; border-radius:999px; font-size:12px; font-weight:500; background:var(--card); border:1px solid var(--border); color:var(--muted); cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .tag-chip:hover,.tag-chip.active { background:var(--primary-subtle); border-color:var(--primary); color:var(--primary); }

    .results-count { font-size:13px; color:var(--muted); margin-bottom:6px; min-height:18px; }

    /* Daily snippet section label */
    .section-label {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .section-label-left { display:flex; align-items:center; gap:10px; }
    .section-title { font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
    .section-date { font-size:13px; color:var(--primary); font-weight:600; }
    .auto-badge {
      font-size:11px; padding:3px 10px; border-radius:999px;
      background:rgba(34,197,94,0.12); color:#22c55e;
      border:1px solid rgba(34,197,94,0.25); font-weight:600;
    }

    .snippet-footer { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .tag-badge { padding:3px 10px; border-radius:999px; font-size:11px; font-weight:600; background:var(--primary-subtle); color:var(--primary); border:1px solid var(--primary-glow); }
    .diff-badge { padding:3px 10px; border-radius:999px; font-size:11px; font-weight:600; text-transform:capitalize; }
    .diff-beginner     { background:rgba(34,197,94,0.15);  color:#22c55e; border:1px solid rgba(34,197,94,0.3); }
    .diff-intermediate { background:rgba(234,179,8,0.15);  color:#eab308; border:1px solid rgba(234,179,8,0.3); }
    .diff-advanced     { background:rgba(239,68,68,0.15);  color:#ef4444; border:1px solid rgba(239,68,68,0.3); }

    /* Random mode label */
    .random-label {
      display:none; align-items:center; gap:8px; margin-bottom:10px;
    }
    .random-label.visible { display:flex; }
    .random-badge {
      font-size:11px; padding:3px 10px; border-radius:999px;
      background:rgba(124,127,245,0.15); color:var(--primary);
      border:1px solid var(--primary-glow); font-weight:600;
    }
    .back-to-daily {
      font-size:12px; color:var(--muted); cursor:pointer; text-decoration:underline;
      background:none; border:none; font-family:inherit; padding:0;
    }
    .back-to-daily:hover { color:var(--primary); }

    .pagination { display:flex; align-items:center; justify-content:center; gap:12px; margin-top:2rem; }
    .pagination button { padding:8px 20px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; font-size:14px; font-weight:500; font-family:inherit; }
    .pagination button:disabled { opacity:0.4; cursor:not-allowed; }
    .pagination button:hover:not(:disabled) { border-color:var(--primary); color:var(--primary); }
    .page-info { font-size:13px; color:var(--muted); }
    #galleryList .snippet-card { margin-bottom:1.2rem; }

    /* Next snippet countdown */
    .next-snippet-info {
      font-size:12px; color:var(--muted); text-align:right;
    }
    .next-snippet-info span { color:var(--primary); font-weight:600; }
  </style>
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-content">
      <div class="sidebar-header">
        <div class="logo-container">
          <div class="logo">&lt;/&gt;</div>
          <h1 class="app-title">DailyCode</h1>
        </div>
        <nav class="nav-menu">
          <button class="nav-item" data-view="dashboard"><span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span></button>
          <button class="nav-item" data-view="calendar"><span class="nav-icon">📅</span><span class="nav-label">Calendar</span></button>
          <button class="nav-item" data-view="favorites"><span class="nav-icon">⭐</span><span class="nav-label">Favorites</span></button>
        </nav>
      </div>
      <div class="sidebar-footer">
        <button class="add-snippet-btn" data-view="add"><span class="add-icon">＋</span> Add Snippet</button>
      </div>
    </div>
  </aside>

  <div class="main-wrapper">
    <div class="app-container">

      <!-- HEADER -->
      <header class="home-header">
        <div class="today-header">
          <h2 class="today-title">
            Daily Code Snippet
            <span class="today-badge">📅 TODAY</span>
          </h2>
          <p id="todayDate" class="date-label"></p>
        </div>
        <div class="right-header">
          <button id="themeToggle" class="btn-icon">🌙</button>
          <button id="logoutBtn" class="btn-secondary">Logout</button>
          <button id="randomBtn" class="btn-primary">🔄 New Random</button>
          <button id="copyBtn" class="btn-secondary">📋 Copy</button>
          <button id="favBtn" class="btn-secondary">☆</button>
        </div>
      </header>

      <!-- SMART SEARCH + FILTERS -->
      <div class="controls">
        <div class="controls-row">
          <input id="searchInput" placeholder="🔍 Search title, code, explanation..." />
          <select id="languageFilter">
            <option value="">All Languages</option>
            <option value="Python">Python</option>
            <option value="JavaScript">JavaScript</option>
            <option value="Java">Java</option>
            <option value="C++">C++</option>
            <option value="HTML">HTML</option>
            <option value="CSS">CSS</option>
            <option value="TypeScript">TypeScript</option>
            <option value="Go">Go</option>
            <option value="Rust">Rust</option>
          </select>
          <select id="difficultyFilter">
            <option value="">All Levels</option>
            <option value="beginner">🟢 Beginner</option>
            <option value="intermediate">🟡 Intermediate</option>
            <option value="advanced">🔴 Advanced</option>
          </select>
        </div>
        <div class="tag-filters" id="tagFilters">
          <span class="tag-filter-label">Tags:</span>
          <span class="tag-chip active" data-tag="">All</span>
        </div>
      </div>

      <p class="results-count" id="resultsCount"></p>

      <!-- TODAY'S SNIPPET (default view) -->
      <div id="dailySection">
        <!-- Section label -->
        <div class="section-label">
          <div class="section-label-left">
            <span class="section-title">📅 Today's Snippet</span>
            <span class="auto-badge">✦ Auto Daily</span>
          </div>
          <span class="next-snippet-info">Next snippet in <span id="countdown">–</span></span>
        </div>

        <!-- Random mode indicator -->
        <div class="random-label" id="randomLabel">
          <span class="random-badge">🔀 Random Snippet</span>
          <button class="back-to-daily" id="backToDaily">← Back to today's snippet</button>
        </div>

        <div class="snippet-card">
          <div class="snippet-header">
            <h3 id="snippetTitle">Loading...</h3>
            <span id="snippetLang" class="snippet-meta"></span>
          </div>
          <pre><code id="snippetCode"></code></pre>
          <p id="snippetExplanation" class="explanation"></p>
          <div class="snippet-footer" id="snippetFooter"></div>
        </div>
      </div>

      <!-- SEARCH RESULTS -->
      <div id="galleryList" style="display:none"></div>

      <!-- PAGINATION -->
      <div class="pagination" id="pagination" style="display:none">
        <button id="prevPage">← Prev</button>
        <span class="page-info" id="pageInfo"></span>
        <button id="nextPage">Next →</button>
      </div>

    </div>
  </div>
</div>

<script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script type ="module" src="Sidebar.js"></script>
<script type ="module" src="script.js"></script>
</body>
</html>
